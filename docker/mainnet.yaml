name: mainnet

services:
  geth:
    image: ghcr.io/goatnetwork/goat-geth:v0.4.2
    restart: unless-stopped
    stop_grace_period: 30s
    network_mode: host
    command:
      - --goat=mainnet
      # Uncomment the following line if you want to run a bootnode
      # - --goat.preset=bootnode
      - --http
      - --http.api=eth,net,web3
      - --http.addr=0.0.0.0
      - --http.vhosts=*
      - --http.corsdomain=*
      - --ws
      - --ws.origins=*
      - --ws.addr=0.0.0.0
      - --ws.api=eth,net,web3
      # Uncomment the following line if you need an archive node
      # - --gcmode=archive
    volumes:
      - /data/geth:/root/.ethereum
    logging:
      driver: local

  goat:
    image: ghcr.io/goatnetwork/goat:v0.4.4
    restart: unless-stopped
    stop_grace_period: 30s
    network_mode: host
    command:
      - start
      - --chain-id=goat-mainnet
      # Uncomment the following line if you want to run a bootnode
      # - --goat.preset=bootnode
      - --goat.geth=/geth/geth.ipc
      # Disable colored logs for better readability in Docker logs
      - --log_no_color
      # Uncomment the following lines if you want to enable gRPC and REST API
      # - --grpc.address=0.0.0.0:9090
      # - --api.enable
      # - --api.address=tcp://0.0.0.0:1317
    depends_on:
      - geth
    volumes:
      - /data/goat:/root/.goat
      - /data/geth:/geth
    logging:
      driver: local
